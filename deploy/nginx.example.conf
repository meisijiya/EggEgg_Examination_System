# ===============================================
# Nginx 反向代理配置示例 — Finance Exam System
# ===============================================
#
# 用途: 当你**没有**用云服务商的反代 (如直接用 nginx 终止 TLS) 时,
#       把本文件放到 /etc/nginx/conf.d/finance-exam.conf 后 nginx -s reload
#
# 假设:
#   - TLS 终止在本 nginx (certbot / 自签 / 上游导入证书)
#   - 后端 finance-exam-system 容器监听 127.0.0.1:8000
#   - SSE 流式响应 (AI 讲解) 需要 proxy_buffering off
#
# 若用阿里云 SLB / 腾讯云 CLB / Cloudflare 终止 TLS:
#   - 这层 nginx 通常不需要 — 云反代直接转发 HTTP 到容器 8000
#   - 但客户端真实 IP 需设置 X-Forwarded-For (见下方配置), FastAPI 信任

# 通用配置 — gzip + buffer
# (放在 http {} 块外但建议 include 到 nginx.conf 的 http {} 块内)

# gzip 压缩: 文本类资源开启, 减少移动端带宽
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

# SSE / streaming 必备 — 禁用缓冲, 否则 nginx 会缓存整个响应再吐出,
# 客户端体验为"卡顿几秒后整段涌出"而非逐字流式
proxy_buffering off;
proxy_cache off;

# 上游真实 IP — 让 FastAPI / 日志能看到客户端公网 IP
# (FastAPI 端通过 request.client.host 读 X-Forwarded-For 首段)
real_ip_header X-Forwarded-For;
set_real_ip_from 127.0.0.1;
set_real_ip_from 10.0.0.0/8;
set_real_ip_from 172.16.0.0/12;
set_real_ip_from 192.168.0.0/16;

# ===============================================
# HTTPS server 块 (本 nginx 终止 TLS)
# ===============================================

# 后端 upstream — 容器在本机监听 8000
upstream finance_exam_backend {
    server 127.0.0.1:8000;
    keepalive 16;  # 复用连接, 减少 TCP handshake 开销
}

server {
    listen 443 ssl http2;
    server_name your-domain.com;  # ← 替换为你的域名

    # TLS 证书路径 (certbot 自动续签)
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # 现代 TLS 配置 — Mozilla intermediate
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # 安全 headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 客户端请求体上限 — 考试答题提交 JSON 不超过 1MB, 1m 足够
    client_max_body_size 1m;

    # API 路由 — 反代到 FastAPI
    location /api/ {
        # rewrite 可选: 若 FastAPI 路由不带 /api 前缀, 则去掉
        # rewrite ^/api/(.*)$ /$1 break;

        proxy_pass http://finance_exam_backend;
        proxy_http_version 1.1;

        # 透传真实客户端信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # 连接复用 — 配合 upstream keepalive
        proxy_set_header Connection "";

        # SSE 关键: 不缓冲, 不缓存, 长 timeout
        # 默认 60s 太短 — AI 讲解可能持续 30-60 秒
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 5s;
    }

    # /health 直通 — 用于云监控 / LB 探针
    location = /health {
        proxy_pass http://finance_exam_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;  # 健康检查不打日志, 减少噪音
    }

    # 静态资源 — SPA 前端构建产物 (由容器内 /app/static 提供)
    # 注: 当前的 FastAPI main.py 未挂载 StaticFiles, 此 location 配置为预留
    # 如启用: 在 backend/app/main.py 添加
    #   from fastapi.staticfiles import StaticFiles
    #   app.mount("/", StaticFiles(directory="/app/static", html=True))
    # 之后取消下方注释
    # location / {
    #     proxy_pass http://finance_exam_backend;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    # 默认 fallback — 当前未挂载静态, 全部代理到后端
    # (FastAPI 仅响应 API 路径, 其他返回 404, 这是预期行为)
    location / {
        proxy_pass http://finance_exam_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 隐藏 nginx 版本 (low-value but good hygiene)
    server_tokens off;
}

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name your-domain.com;
    return 301 https://$host$request_uri;
}